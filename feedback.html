<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedack | Kalashamala</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="feedback.css" type="text/css">
</head>

<body>
    <div class="container-fluid">
        <form class="w-50 mx-auto mt-5 p-4 rounded-4" id="feed">
            <div class="d-flex flex-column">
                <label for="name" class="mt-2">Name : </label>
                <input type="text" id="name" class="form-control" placeholder="Enter Your Name">
                <p id="name_error" style="color: red;"></p>
            </div>
            <div class="d-flex flex-column">
                <label for="phone"  class="mt-2">Phone : </label>
                <input type="number" id="phone" class="form-control" placeholder="Enter Your Phone Number">
                <p id="phone_error" style="color: red;"></p>
            </div>
            <div class="d-flex flex-column">
                <label for="email" class="mt-2">Email : </label>
                <input type="email" id="email" class="form-control" placeholder="Enter Your Email Address">
                <p id="email_error" style="color: red;"></p>
            </div>
            <div class="d-flex flex-column">
                <label for="feedback" class="mt-2">Feedback/Complaint : </label>
                <textarea name="feedback" id="feedback" class="form-control feedback" placeholder="Enter Your Feedback/Complaint"></textarea>
                <p id="feedback_error" style="color: red;"></p>
            </div>
            <button id="submit_btn" class="btn bg-primary text-light mt-4 w-25" type="submit">Submit</button>
            <button class="btn bg-danger text-light ms-4 mt-4 w-25" type="reset">Clear</button>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
        <script src="./feedback.js"></script>
</body>

</html>
